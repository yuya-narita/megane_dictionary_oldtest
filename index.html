<body class="mode-dictionary">
  <main id="app" class="app">
    <header class="topbar">
      <button id="prevWord" class="ghost" type="button" aria-label="前の言葉へ">←</button>
      <div class="brand" aria-label="メガネ辞書">MEGANE DICTIONARY</div>
      <button id="nextWord" class="ghost" type="button" aria-label="次の言葉へ">→</button>
    </header>

    <nav class="mode-toggle" id="modeToggle" aria-label="表示モード">
      <button id="dictionaryMode" class="mode active" type="button" aria-current="page">辞書</button>
      <button id="cardMode" class="mode" type="button">カード</button>
      <button id="musicMode" class="mode-tab" type="button">音楽</button>
        <button id="mangaMode" class="mode" type="button">会議</button>
    </nav>

    <section id="card" class="card" aria-live="polite">
      <div id="content" class="content">
        <div class="hint" id="hint">左右：単語 / 上下：メガネ / 長押し：一覧</div>

        
<div id="contentScreenV127" class="content-screen-v127" hidden></div>
<div id="dictionaryView" class="dictionary-view">
          <div id="glassName" class="glass-name"></div>
          <div id="character" class="character"></div>
          <h1 id="word" class="word">メロンパン</h1>
          <p id="translation" class="translation">メロンパン？ コンビニ入ったら目ぇ合うやつや。</p>
        </div>

        <div id="bugCardView" class="bug-card-view" hidden>
          <div id="flipCard" class="flip-card">
            <img id="flowCard" class="flow-card" src="images/cards/card_back.png" alt="" aria-hidden="true" />
            <img id="deckLayer1" class="deck-layer deck-layer-1" src="images/cards/card_back.png" alt="" aria-hidden="true" />
            <img id="deckLayer2" class="deck-layer deck-layer-2" src="images/cards/card_back.png" alt="" aria-hidden="true" />
            <img id="deckLayer3" class="deck-layer deck-layer-3" src="images/cards/card_back.png" alt="" aria-hidden="true" />
            <div class="flip-inner">
              <div class="flip-face flip-front">
                <img id="cardImage" class="bug-card-image" alt="" />
              </div>
              <div class="flip-face flip-back">
                <img id="cardBackImage" class="bug-card-image" alt="" />
              </div>
            </div>
          </div>
          <div id="cardTitle" class="bug-card-title"></div>
          <div id="cardSubtitle" class="bug-card-subtitle"></div>
          <div id="cardCaption" class="bug-card-caption"></div>
        </div>
<div id="webtoonView" class="webtoon-view" hidden>
          <div id="webtoonStrip" class="webtoon-strip"></div>
        </div>
<div id="mangaView" class="manga-view" hidden>

          <div id="mangaPage" class="manga-page">
            <img id="mangaImage" class="manga-image manga-current-image" alt="" hidden />
            <img id="mangaIncomingImage" class="manga-image manga-incoming-image" alt="" hidden />
            <div id="mangaTitle" class="manga-title"></div>
            <div id="mangaCaption" class="manga-caption"></div>
            <div id="mangaText" class="manga-text"></div>
            </div>
          </div>
        </div>

        <div id="counter" class="counter"></div>
      </div>
    </section>


    <section id="confPlayerLayer" class="conf-player-layer" hidden>
      <div class="conf-stage">
        <div class="conf-onair">ON AIR</div>
        <div id="confTitle" class="conf-title">Syntax Conference</div>
        <div id="confDesc" class="conf-desc"></div>
        <audio id="confNativeAudio" class="conf-native-audio" controls preload="metadata"></audio>
        <div class="conf-player-buttons">
          <button id="confBack15" type="button" class="conf-player-button" aria-label="15秒戻る">⏪ 15秒</button>
          <button id="confPlayPause" type="button" class="conf-player-button conf-main-button">▶ 再生</button>
          <button id="confForward15" type="button" class="conf-player-button" aria-label="15秒進む">15秒 ⏩</button>
        </div>
        <input id="confSeek" class="conf-seek" type="range" min="0" max="1000" value="0" aria-label="会議音声の再生位置" />
        <div id="confTime" class="conf-time">0:00 / 0:00</div>
        <button id="confBackToList" type="button" class="conf-back-button">← 過去ログへ</button>
      </div>
    </section>

    <section id="mangaListLayer" class="manga-list-layer" hidden>
      <div id="mangaListView" class="manga-list"></div>
    </section>

    <section id="mangaChoiceLayer" class="manga-choice-layer" hidden>
      <button id="mangaBackToList" class="manga-back">← 過去ログへ</button>
      <div class="manga-choice-card">
        <div id="mangaChoiceTitle" class="manga-choice-title">作品タイトル</div>
        <div class="manga-choice-subtitle">Conferenceを聴く</div>
        <div class="manga-choice-actions">
          <button id="readPageMode" class="manga-choice-button">再生画面へ</button>
          <button id="readWebtoonMode" class="manga-choice-button" hidden>Webtoonで読む</button>
        </div>
      </div>
    </section>

    <button id="mangaOpenFullscreenButton" class="manga-open-fullscreen" hidden>全画面</button>

    <div id="favoriteLayer" class="favorite-layer">
      <button id="favoriteToggle" class="favorite-button" aria-label="お気に入り">☆</button>
</div>

    <dialog id="favoriteDialog" class="favorite-dialog">
      <div class="favorite-dialog-head">
        <strong>お気に入り</strong>
        <button id="favoriteDialogClose" class="ghost" type="button" aria-label="お気に入りを閉じる">×</button>
      </div>
      <div id="favoriteList" class="favorite-list"></div>
    </dialog>

    <footer class="controls">
      <button id="prevGlass">前のメガネ</button>
      <button id="randomWord">ランダム</button>
      <button id="nextGlass">次のメガネ</button>
      <button id="shareCurrent" class="control">シェア</button>
    </footer>

    <dialog id="glassDialog" class="dialog">
      <h2>メガネを選ぶ</h2>
      <div id="glassList" class="glass-list"></div>
      <button id="closeDialog" class="close" type="button">閉じる</button>
    </dialog>
  </main>

  <div id="fullscreenOverlay" class="fullscreen-overlay" hidden>
    <div id="fullscreenCard" class="fullscreen-card">
      <img id="fullscreenFlowCard" class="fullscreen-flow-card" src="images/cards/card_back.png" alt="" aria-hidden="true" />
      <div id="fullscreenFlipInner" class="fullscreen-flip-inner">
        <div class="fullscreen-face fullscreen-front">
          <img id="fullscreenFrontImage" class="fullscreen-image" alt="" />

        <div class="fullscreen-face fullscreen-back">
          <img id="fullscreenBackImage" class="fullscreen-image" alt="" />
        </div>

    </div>
    <div class="fullscreen-hint">上下:カード / 左右:めくる / タップで閉じる</div>

  <section id="musicView" class="music-view" hidden>
    <div class="music-stage">
      <div class="music-label">MUSIC</div>
      <div id="musicTitle" class="music-title">BGM Playlist</div>
      <audio id="musicAudio" class="music-audio" controls preload="metadata"></audio>
      <div class="music-controls">
        <button id="musicPrev" type="button" class="music-btn">← 前</button>
        <button id="musicPlayPause" type="button" class="music-btn music-main">▶ 再生</button>
        <button id="musicNext" type="button" class="music-btn">次 →</button>
      </div>
      <div id="musicList" class="music-list"></div>
    </div>
  </section>

<audio id="mangaAudio" preload="metadata"></audio>
  <div id="mangaFullscreenOverlay" class="manga-fullscreen-overlay" hidden>
    <button id="mangaFullscreenClose" class="manga-fullscreen-close" type="button">← 戻る</button>

    </div>
  </dialog>
